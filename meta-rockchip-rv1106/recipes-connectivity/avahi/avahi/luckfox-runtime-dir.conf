# Systemd drop-in for avahi-daemon.service.
#
# Ensures /run/avahi-daemon exists and is writable by the avahi user
# *before* avahi-daemon drops privileges. The PID-file / socket path
# is hardcoded in the avahi source at /run/avahi-daemon/, and on a
# fresh tmpfs /run this directory does not exist at boot time.
#
# Note: the EACCES-on-fcntl-lock issue this recipe was originally
# written to work around turned out to be a kernel misconfig
# (CONFIG_FILE_LOCKING=n in the Luckfox SDK defconfig). That is now
# fixed by meta-rockchip-rv1106/recipes-kernel/linux/files/rv1106-emmc.cfg.
# This drop-in stays because pre-creating the RuntimeDirectory is
# still the right thing to do, and the chown handles the privilege-
# drop handshake cleanly.

[Service]
RuntimeDirectory=avahi-daemon
RuntimeDirectoryMode=0755
ExecStartPre=+/bin/chown avahi:avahi /run/avahi-daemon
