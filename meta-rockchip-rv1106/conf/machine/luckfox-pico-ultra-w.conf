#@TYPE: Machine
#@NAME: LuckFox Pico Ultra W
#@SOC: Rockchip RV1106G3
#@DESCRIPTION: LuckFox Pico Ultra W with RV1106G3 SoC,
#              256 MB DDR3L, 8 GB eMMC, AIC8800DC WiFi/BT,
#              LF40-480480-ARK display, GT911 touch, PoE.

require conf/machine/include/luckfox-rv1106.inc

# --- U-Boot ---
UBOOT_MACHINE = "rv1106_defconfig"

# --- Kernel device tree ---
KERNEL_DEVICETREE = "rv1106g-luckfox-pico-ultra-w.dtb"

# --- Board hardware features ---
MACHINE_FEATURES += "emmc wifi bluetooth screen"

# --- RAM ---
LUCKFOX_RAM_MB = "256"

# --- Boot media ---
WKS_FILE = "luckfox-rv1106-emmc.wks"
