# Self-contained Yocto layer for the Rockchip RV1106 SoC family.
#
# Provides everything needed to build a bootable image for the
# Luckfox Pico Ultra W:
#   - Machine config and SoC-family include
#   - Kernel recipe (Luckfox SDK 5.10.x)
#   - U-Boot recipe + rkbin proprietary blobs
#   - WIC partition layout + extlinux config
#   - Distro config (DISTRO = "luckfox-rv1106")
#   - Image recipe (luckfox-image-minimal)
#   - Out-of-tree drivers: AIC8800DC WiFi/BT
#   - Userspace: rknn-runtime, luckfox-pico-status webserver
#
# Must NOT be included alongside meta-rockchip-rk3506 in the same build
# (kernel, U-Boot and rkbin recipes use machine-overridable paths that
# would conflict).

BBPATH .= ":${LAYERDIR}"

BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
"

BBFILE_COLLECTIONS += "rockchip-rv1106"
BBFILE_PATTERN_rockchip-rv1106 = "^${LAYERDIR}/"
BBFILE_PRIORITY_rockchip-rv1106 = "10"

LAYERDEPENDS_rockchip-rv1106 = "core"
LAYERSERIES_COMPAT_rockchip-rv1106 = "scarthgap styhead"
