# Luckfox RV1106 distribution configuration.
#
# Self-contained — does not require meta-luckfox-distro from the
# RK3506-focused luckfox-yocto repo. Targets the RV1106-based
# Luckfox Pico Ultra W (and any future RV1106 boards).

DISTRO = "luckfox-rv1106"
DISTRO_NAME = "Luckfox RV1106 Linux"
DISTRO_VERSION = "0.1"
DISTRO_CODENAME = "experimental"

# Yocto release compatibility
SANITY_TESTED_DISTROS ?= ""

# Init system: systemd is fine on the RV1106 boards we ship (256 MB DDR3L)
INIT_MANAGER = "systemd"
DISTRO_FEATURES:append = " systemd"
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"

# Base distro features
DISTRO_FEATURES = "largefile ipv4 ipv6 usbhost ${DISTRO_FEATURES_DEFAULT}"

# Headless / framebuffer-only — no X11 / Wayland / GPU stack.
DISTRO_FEATURES:remove = "x11 wayland opengl vulkan"

# Accept commercial licenses for rkbin proprietary blobs (DDR init / SPL / TEE)
LICENSE_FLAGS_ACCEPTED:append = " commercial"

# IPK keeps the on-target package db small
PACKAGE_CLASSES = "package_ipk"

# Default to wic + ext4 for an eMMC-flashable rootfs
IMAGE_FSTYPES ?= "wic ext4"
